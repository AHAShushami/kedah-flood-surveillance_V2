name: Update Flood Surveillance Dashboard

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

permissions:
  contents: write # Required to allow committing back to the repo if desired
  pages: write # Required to deploy to Pages
  id-token: write # Required for deployment authentication

# Allow only one concurrent deployment
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl requests

    - name: Run Spatial Join Scraper
      run: |
        python update_surveillance.py

    - name: Commit and Push Changes (Back up raw data)
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add surveillance_data.json index.html
        # Only commit and push if changes exist
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update flood telemetry: $(date)" && git push)

    - name: Upload Pages Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.' # Upload the workspace root containing index.html

  deploy:
    needs: update-dashboard
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
